<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listeler</title>
</head>
<body>
    
    <!-- Sırasız listeleme için ul etiketini kullanırız. -->

    <ul>
        <!-- listeleme yuvarlağının içini boş yuvarlak yaparız. -->
        <li style="list-style-type: circle;">Elma</li>
        <li>Armut</li>
        <li>Şeftali</li>
    </ul>

<!-- listeleme yuvarlağını kare yaparız. -->
      <ul style="list-style-type: square;">
        <li>İnek</li>
        <li>Eşek</li>
        <li>Koyun</li>
    </ul>

    <!-- listeleme tipini görünmez yapabiliriz. -->
  <ul style="list-style-type:none;">
        <li>Su</li>
        <li>Gazoz</li>
        <li>Enerji İçeceği</li>
    </ul>

    <!-- Sıralı Etiket için ol etiketini kullanırız.  -->
    
    <ol>
        <li>Ahmet</li>
        <li>Muhittin</li>
        <li>Namık</li>
        <li>Rüstem</li>
    </ol>

    <!-- Tipine A dersek alfabetik olarak sıralama yapmaya başlar.  -->
     <ol type="A">
        <li>Can</li>
        <li>Cangiller</li>
        <li>Ferhat</li>
        <li>Göçer</li>
    </ol>

    <!-- Tipine I "büyük ı" verirsek otomatik olarak roma rakamı olarak başlar ve ona göre sıralamaya devam eder. -->
     <ol type="I">
        <li>Harun</li>
        <li>Kolçak</li>
        <li>Barbaros</li>
        <li>Hayrettin</li>
    </ol>


</body>
</html>
