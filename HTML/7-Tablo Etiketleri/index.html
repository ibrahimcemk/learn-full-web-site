<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tablo Etiketleri</title>
    <style>
      th {
        text-align: left;
      }
    </style>
  </head>
  <body>
    <table style="width: 100%">
      <!-- tablomuzda içerik oluşturduğımızı belirlemek için table etiketini kullanırız ve sonrasında diğer kullandığımız başlık ve içerik etiketlerini tr ile sararız. -->
      <tr>
        <!-- tabloda başlık için th etiketini kullanırız -->
        <th>İsim</th>
        <th>Soyad</th>
        <th>Yaş</th>
      </tr>

      <tr>
        <td>İbrahim Cem</td>
        <td>Keleş</td>
        <td>24</td>
      </tr>

      <tr>
        <td>Mahmut</td>
        <td>Tuncer</td>
        <td>Bilinmiyor?_</td>
      </tr>
      <!-- veri içeriğini td'ye yazarız. Ek olarak ilk başta th etiketine ne denk geliyorsa onu yazmamız gerekiyor.
 yani 1.th etiketinde isim ne ise td'ye onu yazmamız gerekiyor -->
    </table>
  </body>
</html>
