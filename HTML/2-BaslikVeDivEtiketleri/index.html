<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaslikVeDiv</title>
    <style>
    body{margin: 0;} 

    /* margin sayfadaki dış boşluk etiketidir ve sayfanın normalde belirli bir dış boşluğu vardır.
    margin:0; yaparak bu boşluğu kaldırabiliriz.*/

     </style>
</head>
<body>

    <div>
    <h1>frontend</h1>
    <p>frontend</p>
</div>

<!-- hr çizgi etiketidir -->
<hr>
<!-- hr çizgi etiketidir -->

 <div>
    <h2>Tasarım</h2>
    <p>ve Grafik</p>
</div>
<hr>

 <div>
    <h2>İnternet</h2>
    <p>Gelişimi</p>
<div>
    <!-- br etiketi yazıyı alt satıra almak için kullanılır  -->
    <p>Web Ders <br> Eğitimi</p> 
    <!-- bu p etiketinde Web Ders yazısının altına Eğitimi yazısı gelir yanında değil. -->

    <!-- normalde etiket içine yazı girdiğimizde istediğimiz kadar boşluk bıraksak da yine yan yana gözükür "tarayıcı bizim kodumuzdaki boşlukları görmez" -->
    <pre>webb 


        Eğitimii
    </pre>
    <!-- pre etiketi yazıyı olduğu gibi gösterir, boşlukları vs. Tarayıcı okuyabilir. -->
</div>
</div>
</body>
</html>
